# Purpose:
#   Generic agent manifest for defining identity, ownership, dependencies,
#   and public review metadata.
# Taxonomy bucket: Identity
#
# Required fields:
#   id, name, description, owner, version, status
# Optional fields:
#   model_ref, capability_refs, tool_refs, resource_refs, policy_refs,
#   output_refs, notes
#
# Usage notes:
#   Keep this manifest focused on what the agent is and what it depends on.
#   Put detailed behavior in persona.md and principles.md.
# Public-safety notes:
#   Use generic owners and fake IDs in public examples. Do not include private
#   project names, internal service names, secrets, or runtime state.

id: record-triage-agent
name: Record Triage Agent
description: Classifies synthetic records and routes ambiguous cases for review.
owner:
  name: Example Maintainers
  contact: maintainers@example.invalid
version: 0.1.0
status: draft
model_ref:
  provider: generic-model-provider
  family: general-purpose-language-model
  version: example-model-v1
capability_refs:
  - id: record-triage
    path: ./SKILL.md
tool_refs:
  - id: schema-validator
    path: ./tools.yaml#schema-validator
resource_refs:
  - id: public-category-list
    path: ./resources.yaml#public-category-list
policy_refs:
  - id: public-safety
    path: ../docs/public-safety.md
output_refs:
  - id: record-triage-result
    path: ./output.schema.json
notes:
  - This agent handles synthetic example records only.
